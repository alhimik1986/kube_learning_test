apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuber-args
  labels:
    app: kuber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server-args
  template:
    metadata:
      labels:
        app: http-server-args
    spec:
      containers:
      - name: kuber-app
        image: bakavets/kuber:v1.0-args
        # щРНР ОЮПЮЛЕРП - ЮМЮКНЦ ENTRYPOINT Б docker-ТЮИКЕ (ГЮОСЯЙ *.py ТЮИКЮ)
        command: ["python3", "-u", "server.py"]
        # щРНР ОЮПЮЛЕРП - ЮМЮКНЦ CMD Б docker-ТЮИКЕ (ОЮПЮЛЕРПШ, ОЕПЕДЮБЮЕЛШЕ ОПХ ГЮОСЯЙЕ *.py ТЮИКЮ)
        # args: ["3", "2", "text-temp"]
        args: 
        - "3"
        - "2"
        - text-temp
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: kuber-args-service
spec:
  selector:
    app: http-server-args
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30001
  type: NodePort