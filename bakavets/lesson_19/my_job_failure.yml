apiVersion: batch/v1
kind: Job
metadata:
  name: job-with-restartpolicy-onfailure
spec:
  # Максимальное кол-во неудачных перезапусков (по умолчанию 6)
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: job-with-failure
          image: bisybox
          command: ["/bin/sh", "-c"]
          args: ["echo 'Running Job; sleep 5; exit 1;"]
      # Перезапуск пода в случае ошибки. Отладка возможна только при установке log-агрегатора.
      restartPolicy: OnFailure
