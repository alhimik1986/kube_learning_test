apiVersion: batch/v1
kind: Job
metadata:
  name: job-pi-parallelism
spec:
  # Запустятся 2 параллельные джобы
  parallelism: 2
  backoffLimit: 4
  template:
    spec:
      containers:
        - name: pi
          image: perl
          command: ["perl", "-Mbignum=bpi", "-wle", "print(2000)"]
      restartPolicy: Never
