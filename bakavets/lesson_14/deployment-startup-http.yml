apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server-startup-http
  labels:
    app: http-server-startup-http
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
    spec:
      containers:
        - name: kuber-app
          image: nginx:latest
          ports:
            - containerPort: 80
          startupProbe:
            exec:
              command:
                - "cat"
                - "/server-test.py"
            initialDelaySeconds: 5
            periodSeconds: 5
          # readinessProbe:
            # httpGet:
              # path: /
              # port: 80
            # initialDelaySeconds: 5
            # periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              httpHeaders:
                - name: Host
                  value: my_header_value
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
