# Пример StorageClass, который использует External Volume Plugin EBS
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-csi-gp3
# Чтобы этот StorageClass работал, нужно заранее установить ContainerStorageInterface (CSI) драйвер в кубернетесе
provisioner: ebs.csi.aws.com
allowVolumeExpansion: true
parameters:
  type: gp3
  fsType: ext4
