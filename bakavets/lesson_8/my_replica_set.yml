apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-replica-set
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app-rs
  template:
    metadata:
      name: pod-nginx
      labels:
        # Если эту метку поменять и сделать apply my_replica_set.yml, то ReplicaSet 
        # выдаст ошибку: Invalid value: {"matchLabels":{"app":"nginx-app-rs-1"}}: field is immutable
        app: nginx-app-rs
    spec:
      containers:
        # Если мы поменяем имя контейнера и выволним apply my_replication_controller.yml,
        # то контейнеры в подах не изменятся, пока мы не удалим поды и ReplicaSet не создаст новые поды
        # (с изменёнными контейнерами)
        - name: app-image-nginx
          image: nginx:latest
          ports:
            - containerPort: 80