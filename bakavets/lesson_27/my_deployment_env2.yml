apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment-env-2
  labels:
    app: my-deployment-env-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server-1
  template:
    metadata:
      labels:
        app: http-server-1
    spec:
      containers:
        - name: my-container
          image: nginx:latest
          ports:
            - containerPort: 80
          env:
            - name: SECRET_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secret-data-no-encode
                  key: username
            - name: SECRET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-data-no-encode
                  key: password
