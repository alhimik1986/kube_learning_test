apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment-env
  labels:
    app: my-deployment-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server-1
  template:
    metadata:
      labels:
        app: http-server-1
    spec:
      containers:
        - name: my-container
          image: nginx:latest
          ports:
            - containerPort: 80
          env:
            - name: HELLO
              value: "Hello"
            - name: WORLD
              value: "World"
            - name: ENV_HELLO_WORLD
              value: "$(HELLO)_$(WORLD) from Pod"
