apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cron-job-replace
spec:
  schedule: "*/1 * * * *"
  # Удаляет предыдущую джобу и запускает текущую джобу, если предыдущая не успела завершиться
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello
              image: busybox
              imagePullPolicy: IfNotPresent
              command:
                - "/bin/sh"
                - "-c"
                - "date; echo Hello world; sleep 140"
          restartPolicy: OnFailure
