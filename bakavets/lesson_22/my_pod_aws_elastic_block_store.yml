apiVersion: v1
kind: Pod
metadata:
  name: http-server
spec:
  containers:
    - image: bakavetcs/kuber
      name: http-server
      volumeMounts:
        - mountPath: /cache
          name: aws-volume
  volumes:
    - name: aws-volume
      # This AWS EBS volume must alread exist.
      # Недостаток этого метода в том, что к подам нельзя привязать несколько нод и можно привязать только к  тому региону (--availability-zone), в котором находится сам диск
      # Чтобы решить эту проблему, нужно использовать диски типов networkFileSystem (для Amazone это ElasticFileSystem (EFS диски) сервис, но для этого устанавливают ContainerStorageInterfaceDriver в кластер kubernetes)
      # По умолчанию этот драйвер уже встроен в кубернетес, но лучше установить его драйвер напрямую, чтобы не шла миграция хранилища из "in-tree" плагина. Потому что "in-tree" плагины в дальнейшем поддерживаться не будут.
      awsElasticBlockStore:
        volumeID: "vol-010a0c58f12907a34"
        fsType: ext4
