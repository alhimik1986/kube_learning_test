apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/alhimik1986/kube_learning_test.git
    targetRevision: main
    path: bakavets/lesson_30/charts/demo

    # Здесь мы можем указать helm-параметры 3-мя разными способами
    helm:
      # В виде списка имём параметров и их значений (1-й приоритет)
      parameters:
      - name: "service.port"
        value: "8082"
      # - name: "replicaCount"
      #   value: "4"

      # В виде файла (пути к файлу) (3-й приоритет)
      valueFiles:
      - values-dev.yaml

      # В блочном виде (2-й приоритет)
      values: |
        # replicaCount: 2
        serviceAccount:
          create: true
          annotations:
            demo/role: demo-annotation
          name: sa-custom-name

  # Destination cluster and namespace to deploy the application
  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
