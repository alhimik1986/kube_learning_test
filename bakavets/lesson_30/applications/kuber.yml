apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kuber
  namespace: argocd
  # Если этот параметр указан, то при удалении приложния argocd будут удаляляться и все ресурсы вместе с ним (деплойменты и т.д.)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: development
  # Манифесты, которые мы хотим деплоить
  source:
    repoURL: https://github.com/alhimik1986/kube_learning_test.git
    targetRevision: main
    path: bakavets/lesson_30/dev/kuber
  # В какой kubernetes-кластер мы хотим деплоить наши манифесты
  # В нашем случае мы указываем тот, кластер, в котором argocd был установлен
  destination:
    server: https://kubernetes.default.svc
    namespace: kuber

  syncPolicy:
    # Указываем automated, чтобы argocd проверял изменения в git-репозитории и автоматически применял их (по умолч. интервал проверки 3 мин)
    automated: 
      # Позволяет автоматически удалять те ресурсы, которые уже не существуют в git-репозитории
      # По умолчанию false
      # Нужен (при значении false), чтобы случайно не удалять какие-либо объекты из kubernetes-кластера
      prune: true
      # Сохраняет состояние kubernetes-кластера, которое определено в git-репозитории (например, если удалить deployment, то он его восстановит)
      # По умолчанию false
      # Если false, то он просто выведет ошибку "Out of sync" и синхронизацию можно провести вручную
      selfHeal: true
    syncOptions:
      # Создаём namespace автоматически (spec.destination.namespace), если он ранее не был создан
      - CreateNamespace=true
